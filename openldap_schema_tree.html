<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenLDAP Schema Tree</title>
<style>
:root {
  --bg:       #0e1116;
  --bg2:      #161b22;
  --bg3:      #1c2128;
  --bg4:      #21262d;
  --border:   #30363d;
  --text:     #cdd9e5;
  --dim:      #768390;
  --muted:    #444c56;
  --oc:       #57ab5a;
  --at:       #4184e4;
  --oc-bg:    #1a2e1b;
  --at-bg:    #152030;
  --must:     #e5534b;
  --may:      #c69026;
  --accent:   #316dca;
  --sel:      #1c3a6e;
  --hover:    #1e2731;
  --font-mono:"JetBrains Mono","Fira Code","Cascadia Code",monospace;
  --font-ui:  "IBM Plex Sans","Segoe UI",sans-serif;
  --row-h:    22px;
  --indent:   18px;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-ui); font-size:13px; overflow:hidden; }

#app { display:flex; height:100vh; }

/* --- LEFT PANE --- */
#left { width:360px; min-width:220px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; user-select:none; }

#toolbar { padding:8px 10px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
#toolbar h1 { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
#search { width:100%; background:var(--bg4); border:1px solid var(--border); border-radius:5px; color:var(--text); font-family:var(--font-mono); font-size:11px; padding:5px 8px; outline:none; }
#search:focus { border-color:var(--accent); }
#search::placeholder { color:var(--muted); }

#filter-row { display:flex; gap:4px; flex-wrap:wrap; }
.fbtn { background:var(--bg4); border:1px solid var(--border); border-radius:4px; color:var(--dim); font-size:10px; font-weight:600; padding:2px 8px; cursor:pointer; transition:all .12s; }
.fbtn:hover { color:var(--text); }
.fbtn.active-all  { background:var(--accent); border-color:var(--accent); color:#fff; }
.fbtn.active-oc   { background:var(--oc-bg); border-color:var(--oc); color:var(--oc); }
.fbtn.active-at   { background:var(--at-bg); border-color:var(--at); color:var(--at); }

#expand-row { display:flex; gap:4px; }
.xbtn { background:none; border:none; color:var(--dim); font-size:10px; cursor:pointer; padding:0 4px; }
.xbtn:hover { color:var(--text); }

/* Tree */
#tree-wrap { flex:1; overflow:auto; }
#tree { padding:4px 0; }

.node { display:flex; align-items:center; height:var(--row-h); padding-right:8px; cursor:pointer; white-space:nowrap; }
.node:hover { background:var(--hover); }
.node.selected { background:var(--sel); }

.node-indent { display:inline-flex; align-items:center; flex-shrink:0; }
.tree-line { width:var(--indent); height:var(--row-h); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; }
/* vertical guide lines */
.tree-line.has-more::before {
  content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--border);
}
.tree-line.last-child::before {
  content:''; position:absolute; left:50%; top:0; height:50%; width:1px; background:var(--border);
}
.tree-line.branch::after {
  content:''; position:absolute; left:50%; top:50%; width:calc(50% + 1px); height:1px; background:var(--border);
}
.tree-line.pass::before {
  content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--border);
}

.toggle { width:14px; height:14px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; border-radius:3px; font-size:10px; color:var(--dim); margin-right:2px; }
.toggle:hover { background:var(--bg4); color:var(--text); }
.toggle.leaf { cursor:default; }
.toggle.leaf:hover { background:none; }

.node-icon { width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; margin-right:3px; }

.node-label { font-family:var(--font-mono); font-size:11px; overflow:hidden; text-overflow:ellipsis; flex:1; }
.node-label .match { background:#2d4a1e; color:#8ddb8c; border-radius:2px; }

.node-badge { font-size:9px; font-weight:700; border-radius:3px; padding:1px 4px; margin-left:4px; text-transform:uppercase; flex-shrink:0; }
.badge-oc { background:var(--oc-bg); color:var(--oc); border:1px solid #2a5a2e; }
.badge-at { background:var(--at-bg); color:var(--at); border:1px solid #1a3a6e; }

.node-schema { font-size:9px; color:var(--muted); margin-left:6px; flex-shrink:0; }

/* collapsed children */
.children.collapsed { display:none; }

/* --- RIGHT PANE --- */
#right { flex:1; display:flex; flex-direction:column; overflow:hidden; }

#topbar { background:var(--bg2); border-bottom:1px solid var(--border); height:34px; display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; }
#topbar .tb-title { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
#topbar .tb-count { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-left:auto; }

#detail { flex:1; overflow-y:auto; padding:24px 32px; }
#detail.empty { display:flex; align-items:center; justify-content:center; }
.empty-hint { color:var(--dim); font-size:13px; text-align:center; line-height:2.2; }

/* Detail styles */
.d-hdr { display:flex; align-items:flex-start; gap:12px; margin-bottom:4px; }
.d-kind-badge { font-size:10px; font-weight:700; border-radius:4px; padding:3px 8px; text-transform:uppercase; letter-spacing:.06em; flex-shrink:0; margin-top:5px; }
.d-kind-oc { background:var(--oc-bg); color:var(--oc); border:1px solid #2a5a2e; }
.d-kind-at { background:var(--at-bg); color:var(--at); border:1px solid #1a3a6e; }
.d-name { font-family:var(--font-mono); font-size:20px; font-weight:700; line-height:1.3; }
.d-altnames { font-family:var(--font-mono); font-size:11px; color:var(--dim); margin-bottom:3px; }
.d-schema-line { font-size:11px; color:var(--muted); margin-bottom:14px; }
.d-desc { font-size:13px; line-height:1.65; background:var(--bg2); border-left:3px solid var(--accent); padding:10px 14px; border-radius:0 6px 6px 0; margin-bottom:18px; }
.d-desc.nodesc { color:var(--dim); font-style:italic; }

.d-section { margin-bottom:18px; }
.d-sec-title { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:7px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.d-grid { display:grid; grid-template-columns:150px 1fr; gap:5px 12px; }
.d-key { font-size:11px; color:var(--dim); font-family:var(--font-mono); padding-top:1px; }
.d-val { font-family:var(--font-mono); font-size:11px; color:var(--text); }
.d-val.oid { color:var(--dim); font-size:10px; }

.tag-list { display:flex; flex-wrap:wrap; gap:5px; }
.tag { font-family:var(--font-mono); font-size:11px; border-radius:4px; padding:2px 8px; cursor:pointer; border:1px solid transparent; transition:opacity .12s; }
.tag:hover { opacity:.75; }
.tag-must { background:#2e1111; color:var(--must); border-color:#5a1a1a; }
.tag-may  { background:#221a08; color:var(--may);  border-color:#4a3a10; }
.tag-sup  { background:var(--at-bg); color:var(--at);   border-color:#1a3a6e; }
.tag-ref  { background:var(--bg4);   color:var(--dim);  border-color:var(--border); }

.flag-list { display:flex; flex-wrap:wrap; gap:5px; }
.flag { font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; background:var(--bg4); border:1px solid var(--border); border-radius:4px; padding:2px 7px; color:var(--dim); }
.flag-struct { color:var(--oc); border-color:#2a5a2e; }
.flag-aux    { color:#79c0ff; border-color:#1a3a6e; }
.flag-abs    { color:#d2a8ff; border-color:#3a1a6a; }

.obsolete-banner { background:#2a1a08; border:1px solid #5a3a08; border-radius:5px; padding:6px 12px; font-size:11px; color:var(--may); margin-bottom:14px; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="toolbar">
      <h1>OpenLDAP Schema Tree</h1>
      <input id="search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
      <div id="filter-row">
        <div class="fbtn active-all" data-k="all">All</div>
        <div class="fbtn" data-k="oc">OC only</div>
        <div class="fbtn" data-k="at">AT only</div>
      </div>
      <div id="expand-row">
        <button class="xbtn" id="btn-expand-all">Expand all</button>
        <button class="xbtn" id="btn-collapse-all">Collapse all</button>
      </div>
    </div>
    <div id="tree-wrap"><div id="tree"></div></div>
  </div>
  <div id="right">
    <div id="topbar">
      <span class="tb-title">OpenLDAP 2.6 Schema Reference</span>
      <span class="tb-count" id="count-lbl"></span>
    </div>
    <div id="detail" class="empty">
      <div class="empty-hint">Click any node to see details<br><span style="font-size:11px;color:var(--muted)">OC and AT inheritance trees, click nodes to navigate</span></div>
    </div>
  </div>
</div>

// ---- index ----
const byName = {}; // lower -> entry
RAW.forEach(e => { e.names.forEach(n => { byName[n.toLowerCase()] = e; }); });

// ---- build OC tree ----
// children[name.lower] = [child entries]
const ocChildren = {};
const ocByName = {};
RAW.filter(e=>e.kind==='objectclass').forEach(e => {
  ocByName[e.name.toLowerCase()] = e;
  if(!ocChildren[e.name.toLowerCase()]) ocChildren[e.name.toLowerCase()] = [];
  (e.sup||[]).forEach(s => {
    const sk = s.toLowerCase();
    if(!ocChildren[sk]) ocChildren[sk] = [];
    ocChildren[sk].push(e);
  });
});
// roots: OC with no sup, or whose sup is not in our set
const ocRoots = RAW.filter(e => e.kind==='objectclass' && (
  !e.sup || e.sup.length===0 || e.sup.every(s => !ocByName[s.toLowerCase()])
));

// ---- build AT tree ----
const atChildren = {};
RAW.filter(e=>e.kind==='attributetype').forEach(e => {
  if(!atChildren[e.name.toLowerCase()]) atChildren[e.name.toLowerCase()] = [];
  const sup = e.sup;
  if(sup) {
    const sk = sup.toLowerCase();
    if(!atChildren[sk]) atChildren[sk] = [];
    atChildren[sk].push(e);
  }
});
const atRoots = RAW.filter(e => e.kind==='attributetype' && (!e.sup || !byName[e.sup.toLowerCase()]));

// ---- virtual roots ----
const TREE_ROOTS = [
  { kind:'_group', name:'objectClasses', children: ocRoots },
  { kind:'_group', name:'attributeTypes', children: atRoots },
];

// ---- state ----
let filterKind = 'all';
let searchQuery = '';
let selectedNode = null;
const expandState = {}; // nodeKey -> bool (true=expanded)

function nodeKey(e) { return e.kind + ':' + e.name + ':' + (e.schema||''); }

// ---- render tree ----
const treeEl = document.getElementById('tree');
const countLbl = document.getElementById('count-lbl');

function getChildren(e) {
  if(e.kind==='_group') return e.children || [];
  if(e.kind==='objectclass') return ocChildren[e.name.toLowerCase()] || [];
  if(e.kind==='attributetype') return atChildren[e.name.toLowerCase()] || [];
  return [];
}

function matchesFilter(e) {
  if(e.kind==='_group') return true;
  if(filterKind==='oc' && e.kind!=='objectclass') return false;
  if(filterKind==='at' && e.kind!=='attributetype') return false;
  return true;
}

function matchesSearch(e, q) {
  if(!q) return true;
  if(e.kind==='_group') return false;
  const hay = (e.names.join(' ') + ' ' + e.oid + ' ' + (e.desc||'')).toLowerCase();
  return hay.includes(q);
}

// Returns true if node or any descendant matches search
function subtreeMatches(e, q) {
  if(!q) return matchesFilter(e);
  if(!matchesFilter(e)) return false;
  if(matchesSearch(e, q)) return true;
  return getChildren(e).some(c => subtreeMatches(c, q));
}

function renderTree() {
  treeEl.innerHTML = '';
  let visible = 0;
  TREE_ROOTS.forEach(root => {
    renderNode(root, treeEl, [], true, visible);
  });
  // count visible leaves
  countLbl.textContent = '';
}

function renderNode(e, container, ancestorIsLast, isLast, depth) {
  if(!subtreeMatches(e, searchQuery)) return;

  const kids = getChildren(e).filter(c => subtreeMatches(c, searchQuery));
  const hasKids = kids.length > 0;
  const key = nodeKey(e);
  if(expandState[key] === undefined) {
    // auto-expand groups and shallow nodes
    expandState[key] = (e.kind==='_group') || depth < 2;
  }
  if(searchQuery) expandState[key] = true;

  const row = document.createElement('div');
  row.className = 'node' + (selectedNode && selectedNode.name===e.name && selectedNode.kind===e.kind ? ' selected' : '');
  row.dataset.key = key;

  // Build indent with guide lines
  const indent = document.createElement('span');
  indent.className = 'node-indent';
  // For each ancestor level, draw pass or empty
  ancestorIsLast.forEach((anc, i) => {
    const line = document.createElement('span');
    line.className = 'tree-line' + (anc ? '' : ' pass');
    indent.appendChild(line);
  });
  // The connecting line for this node
  if(depth >= 0) {
    const line = document.createElement('span');
    line.className = 'tree-line branch' + (isLast ? ' last-child' : ' has-more');
    indent.appendChild(line);
  }

  row.appendChild(indent);

  // Toggle
  const tog = document.createElement('span');
  tog.className = 'toggle' + (hasKids ? '' : ' leaf');
  if(hasKids) tog.textContent = expandState[key] ? '▾' : '▸';
  else tog.textContent = '';
  row.appendChild(tog);

  // Icon
  const icon = document.createElement('span');
  icon.className = 'node-icon';
  if(e.kind==='_group') icon.textContent = '📁';
  else if(e.kind==='objectclass') icon.textContent = '🔷';
  else icon.textContent = '🔹';
  row.appendChild(icon);

  // Label
  const label = document.createElement('span');
  label.className = 'node-label';
  if(searchQuery && e.kind!=='_group') {
    const idx = e.name.toLowerCase().indexOf(searchQuery);
    if(idx>=0) {
      label.innerHTML = esc(e.name.slice(0,idx)) +
        '<span class="match">' + esc(e.name.slice(idx, idx+searchQuery.length)) + '</span>' +
        esc(e.name.slice(idx+searchQuery.length));
    } else {
      label.textContent = e.name;
    }
  } else {
    label.textContent = e.name;
  }
  row.appendChild(label);

  // Badge
  if(e.kind==='objectclass' || e.kind==='attributetype') {
    const badge = document.createElement('span');
    badge.className = 'node-badge ' + (e.kind==='objectclass' ? 'badge-oc' : 'badge-at');
    badge.textContent = e.kind==='objectclass' ? 'OC' : 'AT';
    row.appendChild(badge);
  }

  // Schema label
  if(e.schema) {
    const sl = document.createElement('span');
    sl.className = 'node-schema';
    sl.textContent = e.schema;
    row.appendChild(sl);
  }

  container.appendChild(row);

  // Children container
  const childWrap = document.createElement('div');
  childWrap.className = 'children' + (expandState[key] ? '' : ' collapsed');
  childWrap.dataset.key = key;
  container.appendChild(childWrap);

  kids.forEach((child, i) => {
    const childIsLast = i === kids.length - 1;
    renderNode(child, childWrap, [...ancestorIsLast, isLast], childIsLast, depth+1);
  });

  // Click handlers
  if(hasKids) {
    tog.addEventListener('click', ev => {
      ev.stopPropagation();
      expandState[key] = !expandState[key];
      tog.textContent = expandState[key] ? '▾' : '▸';
      childWrap.classList.toggle('collapsed', !expandState[key]);
    });
  }

  row.addEventListener('click', () => {
    if(hasKids) {
      expandState[key] = !expandState[key];
      tog.textContent = expandState[key] ? '▾' : '▸';
      childWrap.classList.toggle('collapsed', !expandState[key]);
    }
    if(e.kind !== '_group') {
      selectNode(e, row);
    }
  });
}

function selectNode(e, rowEl) {
  document.querySelectorAll('.node.selected').forEach(n=>n.classList.remove('selected'));
  if(rowEl) rowEl.classList.add('selected');
  selectedNode = e;
  showDetail(e);
}

// ---- detail panel ----
const detailEl = document.getElementById('detail');

function showDetail(e) {
  detailEl.className = '';
  detailEl.innerHTML = buildDetail(e);
  detailEl.querySelectorAll('.tag[data-ref]').forEach(t => {
    t.addEventListener('click', () => {
      const ref = byName[t.dataset.ref.toLowerCase()];
      if(!ref) return;
      // find or scroll to that node in tree
      navigateTo(ref);
    });
  });
}

function navigateTo(e) {
  // expand path to e and select it
  // For now, just show detail and highlight
  selectedNode = e;
  showDetail(e);
  // Try to find the row
  const rows = document.querySelectorAll('.node');
  rows.forEach(r => r.classList.remove('selected'));
  const key = nodeKey(e);
  const row = document.querySelector(`.node[data-key="${CSS.escape(key)}"]`);
  if(row) {
    row.classList.add('selected');
    row.scrollIntoView({block:'nearest'});
  } else {
    // expand all and re-render to find it
    expandAll();
    renderTree();
    setTimeout(() => {
      const r2 = document.querySelector(`.node[data-key="${CSS.escape(key)}"]`);
      if(r2) { r2.classList.add('selected'); r2.scrollIntoView({block:'nearest'}); }
    }, 50);
  }
}

function buildDetail(e) {
  const kindCls = e.kind==='objectclass' ? 'd-kind-oc' : 'd-kind-at';
  const kindLabel = e.kind==='objectclass' ? 'objectClass' : 'attributeType';
  let h = '';
  h += `<div class="d-hdr"><span class="d-kind-badge ${kindCls}">${kindLabel}</span>`;
  h += `<div><div class="d-name">${esc(e.name)}</div>`;
  if(e.names && e.names.length>1) h += `<div class="d-altnames">also: ${e.names.slice(1).map(esc).join(', ')}</div>`;
  h += `</div></div>`;
  h += `<div class="d-schema-line">schema: <strong>${esc(e.schema)}</strong></div>`;
  if(e.obsolete) h += `<div class="obsolete-banner">&#9888; OBSOLETE</div>`;
  h += `<div class="d-desc${e.desc?'':' nodesc'}">${e.desc ? esc(e.desc) : 'No description'}</div>`;

  h += `<div class="d-section"><div class="d-sec-title">Identity</div><div class="d-grid">`;
  h += `<div class="d-key">OID</div><div class="d-val oid">${esc(e.oid)}</div>`;

  if(e.kind==='objectclass') {
    const kk = e.structural?'STRUCTURAL':e.auxiliary?'AUXILIARY':e.abstract?'ABSTRACT':'(unspecified)';
    const kcls = e.structural?'flag-struct':e.auxiliary?'flag-aux':'flag-abs';
    h += `<div class="d-key">kind</div><div class="d-val"><span class="flag ${kcls}">${kk}</span></div>`;
    if(e.sup && e.sup.length) {
      h += `<div class="d-key">SUP</div><div class="d-val"><div class="tag-list">${e.sup.map(s=>tagLink(s,'tag-sup')).join('')}</div></div>`;
    }
  } else {
    if(e.sup) h += `<div class="d-key">SUP</div><div class="d-val"><div class="tag-list">${tagLink(e.sup,'tag-sup')}</div></div>`;
    if(e.syntax) h += `<div class="d-key">SYNTAX</div><div class="d-val">${esc(e.syntax)}${e.syntax_oid?`<br><span style="color:var(--muted);font-size:10px">${esc(e.syntax_oid)}</span>`:''}</div>`;
    if(e.equality) h += `<div class="d-key">EQUALITY</div><div class="d-val">${esc(e.equality)}</div>`;
    if(e.ordering) h += `<div class="d-key">ORDERING</div><div class="d-val">${esc(e.ordering)}</div>`;
    if(e.substr)   h += `<div class="d-key">SUBSTR</div><div class="d-val">${esc(e.substr)}</div>`;
    if(e.usage && e.usage!=='userApplications') h += `<div class="d-key">USAGE</div><div class="d-val">${esc(e.usage)}</div>`;
    const flags=[];
    if(e.single_value) flags.push(['SINGLE-VALUE','']);
    if(e.collective)   flags.push(['COLLECTIVE','']);
    if(e.no_user_mod)  flags.push(['NO-USER-MODIFICATION','']);
    if(flags.length) h += `<div class="d-key">flags</div><div class="d-val"><div class="flag-list">${flags.map(([f,c])=>`<span class="flag ${c}">${f}</span>`).join('')}</div></div>`;
  }
  h += `</div></div>`;

  if(e.kind==='objectclass') {
    const subOC = ocChildren[e.name.toLowerCase()]||[];
    if(subOC.length) {
      h += `<div class="d-section"><div class="d-sec-title">Subclasses (${subOC.length})</div><div class="tag-list">${subOC.map(x=>tagLink(x.name,'tag-ref')).join('')}</div></div>`;
    }
    if(e.must&&e.must.length) h += `<div class="d-section"><div class="d-sec-title">MUST — required attributes</div><div class="tag-list">${e.must.map(a=>tagLink(a,'tag-must')).join('')}</div></div>`;
    if(e.may&&e.may.length)   h += `<div class="d-section"><div class="d-sec-title">MAY — optional attributes</div><div class="tag-list">${e.may.map(a=>tagLink(a,'tag-may')).join('')}</div></div>`;
  }

  if(e.kind==='attributetype') {
    const usedBy = RAW.filter(x => x.kind==='objectclass' && (
      (x.must||[]).some(a=>a.toLowerCase()===e.name.toLowerCase()) ||
      (x.may||[]).some(a=>a.toLowerCase()===e.name.toLowerCase())
    ));
    if(usedBy.length) {
      h += `<div class="d-section"><div class="d-sec-title">Used by objectClasses (${usedBy.length})</div><div class="tag-list">${usedBy.map(x=>tagLink(x.name,'tag-ref')).join('')}</div></div>`;
    }
    const atKids = atChildren[e.name.toLowerCase()]||[];
    if(atKids.length) {
      h += `<div class="d-section"><div class="d-sec-title">Subtypes (${atKids.length})</div><div class="tag-list">${atKids.map(x=>tagLink(x.name,'tag-sup')).join('')}</div></div>`;
    }
  }
  return h;
}

function tagLink(name, cls) {
  return `<span class="tag ${cls}" data-ref="${esc(name)}">${esc(name)}</span>`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- controls ----
document.getElementById('filter-row').addEventListener('click', e => {
  const b = e.target.closest('.fbtn'); if(!b) return;
  filterKind = b.dataset.k;
  document.querySelectorAll('.fbtn').forEach(x => x.className = 'fbtn');
  b.className = 'fbtn active-' + filterKind;
  renderTree();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderTree();
});

function expandAll() { Object.keys(expandState).forEach(k => expandState[k]=true); }
function collapseAll() { Object.keys(expandState).forEach(k => { if(!k.startsWith('_group')) expandState[k]=false; }); }

document.getElementById('btn-expand-all').addEventListener('click', () => { expandAll(); renderTree(); });
document.getElementById('btn-collapse-all').addEventListener('click', () => { collapseAll(); renderTree(); });

renderTree();
</script>
</body>
